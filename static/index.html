<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki風アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #2c3e50;
      color: white;
      padding: 16px 24px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    main { max-width: 700px; margin: 32px auto; padding: 0 16px; }

    section { background: white; border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    section h2 { font-size: 1rem; margin-bottom: 16px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 8px; }

    /* フォーム */
    .row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95rem;
    }
    button {
      padding: 8px 16px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
    }
    .btn-primary { background: #2980b9; color: white; }
    .btn-primary:hover { background: #2471a3; }
    .btn-study   { background: #27ae60; color: white; font-size: 0.85rem; padding: 6px 12px; }
    .btn-study:hover { background: #1e8449; }
    .btn-next    { background: #8e44ad; color: white; }
    .btn-next:hover { background: #76389d; }
    .btn-reveal  { background: #e67e22; color: white; }
    .btn-reveal:hover { background: #ca6f1e; }

    /* デッキリスト */
    #deck-list { list-style: none; }
    #deck-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    #deck-list li:last-child { border-bottom: none; }
    .deck-name { font-weight: 500; }
    .deck-id   { font-size: 0.78rem; color: #aaa; margin-left: 6px; }
    #empty-msg { color: #aaa; font-size: 0.9rem; }

    /* 学習カード */
    #study-area { display: none; }
    #card-box {
      border: 2px solid #2980b9; border-radius: 8px;
      min-height: 120px; padding: 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin-bottom: 16px; text-align: center;
    }
    #card-front { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
    #card-back  { font-size: 1rem; color: #555; margin-top: 12px; display: none; padding-top: 12px; border-top: 1px solid #ddd; width: 100%; }
    #study-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    #no-card-msg { color: #e74c3c; font-size: 0.9rem; }
    #studying-deck { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>📚 Anki風アプリ (MVP)</header>

<main>

  <!-- デッキ作成 -->
  <section>
    <h2>デッキを作成</h2>
    <div class="row">
      <input type="text" id="deck-name-input" placeholder="デッキ名を入力..." />
      <button class="btn-primary" onclick="createDeck()">作成</button>
    </div>
  </section>

  <!-- デッキ一覧 -->
  <section>
    <h2>デッキ一覧</h2>
    <ul id="deck-list"><li id="empty-msg">読み込み中...</li></ul>
  </section>

  <!-- 学習エリア -->
  <section id="study-area">
    <h2>学習</h2>
    <p id="studying-deck"></p>
    <div id="card-box">
      <div id="card-front"></div>
      <div id="card-back"></div>
    </div>
    <p id="no-card-msg" style="display:none; text-align:center;">このデッキにカードがありません。</p>
    <div id="study-controls">
      <button class="btn-reveal" id="btn-reveal" onclick="revealBack()">答えを見る</button>
      <button class="btn-next"   id="btn-next"   onclick="nextCard()" style="display:none;">次のカード</button>
    </div>
  </section>

</main>

<script>
  let currentDeckId = null;

  // ===== デッキ一覧の読み込み =====
  async function loadDecks() {
    const res  = await fetch('/decks');
    const decks = await res.json();
    const list  = document.getElementById('deck-list');
    list.innerHTML = '';

    if (decks.length === 0) {
      list.innerHTML = '<li id="empty-msg">デッキがありません</li>';
      return;
    }

    decks.forEach(deck => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span>
          <span class="deck-name">${deck.name}</span>
          <span class="deck-id">#${deck.id}</span>
        </span>
        <button class="btn-study" onclick="startStudy(${deck.id}, '${deck.name}')">学習する</button>
      `;
      list.appendChild(li);
    });
  }

  // ===== デッキ作成 =====
  async function createDeck() {
    const input = document.getElementById('deck-name-input');
    const name  = input.value.trim();
    if (!name) { alert('デッキ名を入力してください'); return; }

    await fetch('/decks', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name }),
    });

    input.value = '';
    await loadDecks();
  }

  // ===== 学習開始 =====
  function startStudy(deckId, deckName) {
    currentDeckId = deckId;
    document.getElementById('studying-deck').textContent = `デッキ: ${deckName}`;
    document.getElementById('study-area').style.display = 'block';
    document.getElementById('study-area').scrollIntoView({ behavior: 'smooth' });
    nextCard();
  }

  // ===== 次のカードを取得 =====
  async function nextCard() {
    const res = await fetch(`/decks/${currentDeckId}/study`);

    document.getElementById('card-back').style.display  = 'none';
    document.getElementById('btn-reveal').style.display = 'inline-block';
    document.getElementById('btn-next').style.display   = 'none';
    document.getElementById('no-card-msg').style.display = 'none';

    if (res.status === 404) {
      document.getElementById('card-front').textContent  = '';
      document.getElementById('no-card-msg').style.display = 'block';
      document.getElementById('btn-reveal').style.display  = 'none';
      return;
    }

    const card = await res.json();
    document.getElementById('card-front').textContent = card.front;
    document.getElementById('card-back').textContent  = card.back;
  }

  // ===== 答えを表示 =====
  function revealBack() {
    document.getElementById('card-back').style.display  = 'block';
    document.getElementById('btn-reveal').style.display = 'none';
    document.getElementById('btn-next').style.display   = 'inline-block';
  }

  // ===== Enterキーでデッキ作成 =====
  document.getElementById('deck-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createDeck();
  });

  // 初期ロード
  loadDecks();
</script>

</body>
</html>
